# ============================================================
#  netlify.toml – MeetSum deployment configuration
# ============================================================

[build]
  functions = "netlify/functions"
  publish    = "."         # Serve static files from repo root

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "PIN_ITER,GEMINI_MODEL"

[functions]
  node_bundler = "esbuild"

# ---- Redirect /api/* → Netlify Functions (no script.js changes needed) ----
[[redirects]]
  from   = "/api/summarize"
  to     = "/.netlify/functions/summarize"
  status = 200

[[redirects]]
  from   = "/api/pin-status"
  to     = "/.netlify/functions/pin-status"
  status = 200

[[redirects]]
  from   = "/api/verify-pin"
  to     = "/.netlify/functions/verify-pin"
  status = 200

# ---- Security headers for all responses ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy    = "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; worker-src 'self'"

# ---- Cache static assets ----
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/lang/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
